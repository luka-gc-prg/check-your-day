<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>check your day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#121212;--card:#1a1a1a;--card-hover:#222;--border:#252525;--border-light:#333;
  --text:#eaeaea;--text-sec:#888;--text-muted:#555;
  --green:#3fb950;--green-dim:rgba(63,185,80,.12);--red:#f85149;--red-dim:rgba(248,81,73,.1);
  /* Section colors */
  --c-home:#9580ff;--c-home-dim:rgba(149,128,255,.08);--c-home-bg:rgba(149,128,255,.04);
  --c-shop:#ff6b8a;--c-shop-dim:rgba(255,107,138,.1);--c-shop-bg:rgba(255,107,138,.04);
  --c-todo:#4ecdc4;--c-todo-dim:rgba(78,205,196,.1);--c-todo-bg:rgba(78,205,196,.04);
  --c-cal:#58a6ff;--c-cal-dim:rgba(88,166,255,.1);--c-cal-bg:rgba(88,166,255,.04);
  /* Active section (set by JS) */
  --accent:var(--c-home);--accent-dim:var(--c-home-dim);--accent-bg:var(--c-home-bg);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--bg)}

/* Section bg */
.content{flex:1;overflow-y:auto;padding:.5rem 1.25rem 6rem;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;background:var(--accent-bg);transition:background .4s}
.content::-webkit-scrollbar{width:0}

/* Auth */
.auth{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(2rem + env(safe-area-inset-top)) 2rem 2rem;gap:2.5rem}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:.6rem}
.auth-logo-icon{width:88px;height:88px}
.auth-logo h1{font-family:'Space Grotesk',sans-serif;font-size:1.9rem;font-weight:700;letter-spacing:-1px;text-align:center;color:var(--text)}
.auth-logo p{color:var(--text-muted);font-size:.8rem;margin-top:0;text-align:center;letter-spacing:.5px;text-transform:uppercase}
.auth-users{display:flex;gap:1.5rem}
.auth-user{display:flex;flex-direction:column;align-items:center;gap:.7rem;cursor:pointer;padding:1.4rem 2rem;border-radius:18px;background:var(--surface);border:1.5px solid var(--border);transition:all .3s}
.auth-user:hover{transform:translateY(-3px);border-color:var(--border-light)}
.auth-user span{font-weight:500;font-size:.9rem;color:var(--text-sec)}
.auth-pass{width:100%;max-width:280px;display:none;flex-direction:column;gap:.75rem;align-items:center}
.auth-pass.show{display:flex}
.auth-pass label{font-size:.7rem;font-weight:600;color:var(--text-sec);text-transform:uppercase;letter-spacing:.5px}
.auth-error{background:var(--red-dim);color:var(--red);font-size:.78rem;padding:.5rem .7rem;border-radius:10px;text-align:center;width:100%}

.avatar{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;color:#fff}
.avatar-sm{width:24px;height:24px;font-size:.6rem;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-weight:600;color:#fff;flex-shrink:0}
.avatar-header{width:32px;height:32px;font-size:.75rem;border-radius:9px}

.input{width:100%;padding:.65rem .85rem;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.88rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
.input-tc{text-align:center}
.btn{width:100%;padding:.75rem;border-radius:12px;background:var(--accent);color:#fff;border:none;font-size:.88rem;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:var(--card);color:var(--text-sec)}

/* Header */
.header{padding:calc(.85rem + env(safe-area-inset-top)) 1.25rem .65rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:.65rem}
.header h2{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:-.5px;color:var(--accent)}
.header-actions{display:flex;align-items:center;gap:.4rem}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative}
.icon-btn:hover{background:var(--card);color:var(--text-sec)}
.icon-btn.active{background:var(--accent-dim);color:var(--accent);border-color:transparent}
.badge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;font-size:.5rem;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}

/* Section Label */
.section-label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin:1.2rem 0 .65rem}

/* Stats */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem;margin-bottom:.65rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:.8rem;text-align:center;cursor:pointer;transition:all .2s}
.stat-card:hover{border-color:var(--border-light)}
.stat-num{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700}
.stat-label{font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-top:.1rem}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:.8rem .9rem;margin-bottom:.5rem;transition:all .2s}
.card:hover{border-color:var(--border-light)}
.card-done{opacity:.35}
.card-row{display:flex;align-items:center;gap:.65rem}
.card-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border-light);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.card-check.checked{background:var(--green);border-color:var(--green)}
.card-text{flex:1;font-size:.88rem;font-weight:500;line-height:1.3}
.card-text.done{text-decoration:line-through;color:var(--text-muted)}
.card-meta{display:flex;align-items:center;gap:.4rem;margin-top:.4rem;margin-left:1.9rem;flex-wrap:wrap}
.tag{font-size:.63rem;font-weight:500;padding:.15rem .45rem;border-radius:5px;display:inline-flex;align-items:center;gap:.2rem;white-space:nowrap}
.del-btn{width:24px;height:24px;border-radius:6px;background:none;border:none;color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:all .2s;flex-shrink:0}
.card:hover .del-btn{opacity:1}
.del-btn:hover{color:var(--red);background:var(--red-dim)}
.priority-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Filter tabs */
.filter-tabs{display:flex;gap:.3rem;margin-bottom:.8rem;overflow-x:auto;scrollbar-width:none}
.filter-tabs::-webkit-scrollbar{display:none}
.filter-tab{padding:.38rem .7rem;border-radius:9px;background:var(--card);border:1px solid var(--border);color:var(--text-sec);font-size:.72rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Inter',sans-serif}
.filter-tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.cal-header h3{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;color:var(--text)}
.cal-nav{display:flex;gap:.35rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:.8rem}
.cal-day-label{text-align:center;font-size:.58rem;font-weight:600;color:var(--text-muted);padding:.3rem 0;text-transform:uppercase}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;font-size:.8rem;font-weight:500;cursor:pointer;color:var(--text-sec);transition:all .15s;gap:2px}
.cal-day:hover{background:var(--card)}
.cal-day.today{background:var(--accent-dim);color:var(--accent);font-weight:700}
.cal-day.selected{background:var(--accent);color:#fff}
.cal-day.other{color:var(--text-muted);opacity:.2}
.cal-dots{display:flex;gap:2px;height:4px}
.cal-dot{width:4px;height:4px;border-radius:50%}

/* Events */
.ev-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:.8rem .9rem;margin-bottom:.45rem;display:flex;gap:.7rem;align-items:flex-start;transition:border-color .2s}
.ev-card:hover{border-color:var(--border-light)}
.ev-bar{width:3px;min-height:36px;border-radius:2px;flex-shrink:0}
.ev-content{flex:1;min-width:0}
.ev-title{font-weight:600;font-size:.88rem;margin-bottom:.2rem}
.ev-detail{font-size:.72rem;color:var(--text-sec);display:flex;align-items:center;gap:.25rem;margin-top:2px;flex-wrap:wrap}
.ev-actions{display:flex;gap:.3rem;margin-top:.5rem;flex-wrap:wrap}
.ev-action{font-size:.67rem;font-weight:600;padding:.25rem .55rem;border-radius:7px;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .2s}
.ev-action:hover{opacity:.8}
.ev-accept{background:var(--green-dim);color:var(--green)}
.ev-suggest{background:rgba(240,136,62,.12);color:#f0883e}
.ev-decline{background:var(--red-dim);color:var(--red)}
.ev-export{background:var(--accent-dim);color:var(--accent)}
.suggest-banner{background:rgba(240,136,62,.08);border:1px solid rgba(240,136,62,.15);border-radius:8px;padding:.45rem .7rem;margin-top:.4rem;font-size:.72rem;color:#f0883e;display:flex;align-items:center;gap:.4rem}
.suggest-banner button{font-size:.65rem;font-weight:600;padding:.18rem .4rem;border-radius:5px;border:none;cursor:pointer;margin-left:auto;background:var(--green-dim);color:var(--green);font-family:'Inter',sans-serif}

/* Sync */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s}
.sync-dot.syncing{background:#f0883e;animation:pulse .8s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Nav */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:rgba(10,10,10,.95);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:.4rem .5rem calc(.4rem + env(safe-area-inset-bottom));z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:.18rem;padding:.4rem 0;cursor:pointer;color:var(--text-muted);border:none;background:none;font-family:inherit;transition:color .2s}
.nav-item.active{color:var(--accent)}
.nav-item span{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.fab{position:absolute;bottom:calc(4rem + env(safe-area-inset-bottom));right:1.25rem;width:48px;height:48px;border-radius:14px;background:var(--accent);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:101;transition:transform .2s}
.fab:hover{transform:scale(1.05)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:1.3rem;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-header h3{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700}
.close-btn{width:28px;height:28px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text-sec);display:flex;align-items:center;justify-content:center;cursor:pointer}
.input-group{margin-bottom:.8rem}
.input-group label{display:block;font-size:.65rem;font-weight:600;color:var(--text-muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.5px}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.cat-pills{display:flex;flex-wrap:wrap;gap:.35rem}
.cat-pill{padding:.4rem .65rem;border-radius:8px;background:var(--card);border:1.5px solid var(--border);color:var(--text-sec);font-size:.73rem;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.25rem}
.cat-pill.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.cat-pill-multi.active{border-color:var(--c-todo);background:var(--c-todo-dim);color:var(--c-todo)}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-muted)}
.empty-state p{font-size:.8rem}

.notif-banner{background:var(--accent-dim);border:1px solid rgba(149,128,255,.12);border-radius:12px;padding:.75rem .9rem;margin-bottom:.65rem;display:flex;align-items:center;gap:.6rem;cursor:pointer}
.notif-banner p{font-size:.78rem;flex:1;color:var(--accent)}
.notif-banner .btn-sm{flex-shrink:0;width:auto;padding:.3rem .65rem;font-size:.68rem;border-radius:7px}

svg.i{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;vertical-align:middle}
svg.i-sm{width:10px;height:10px}
svg.i-lg{width:18px;height:18px}
svg.i-check{width:12px;height:12px;stroke:#fff}
</style>
</head>

function setSection(page){const s=SECTION[page]||SECTION.home;document.documentElement.style.setProperty("--accent",s.accent);document.documentElement.style.setProperty("--accent-dim",s.dim);document.documentElement.style.setProperty("--accent-bg",s.bg)}

// API
async function api(p,m="GET",b=null){const h={"Content-Type":"application/json"};if(S.token)h["Authorization"]=`Bearer ${S.token}`;const o={method:m,headers:h};if(b)o.body=JSON.stringify(b);const r=await fetch(API_URL+p,o);const d=await r.json();if(!r.ok)throw new Error(d.error||"Fehler");return d}
async function sync(){if(!S.token)return;try{S.syncStatus="syncing";updateSyncDot();const[s,t,e,u]=await Promise.all([api("/api/shopping"),api("/api/todos"),api("/api/events"),api("/api/users")]);S.shopping=s.shopping||[];S.todos=t.todos||[];S.events=e.events||[];S.users=u.users||[];S.syncStatus="ok";if(!S.modal)render();else updateSyncDot();checkReminders()}catch(e){S.syncStatus="error";updateSyncDot()}}
function startSync(){sync();syncTimer=setInterval(sync,SYNC_INTERVAL);startReminderCheck()}
function stopSync(){if(syncTimer)clearInterval(syncTimer);syncTimer=null;stopReminderCheck()}
function updateSyncDot(){const d=document.getElementById("sync-dot");if(d)d.className=`sync-dot ${S.syncStatus==="syncing"?"syncing":S.syncStatus==="error"?"error":""}`}

// Auth
async function doLogin(u,p){try{S.authError=null;const d=await api("/api/auth/login","POST",{username:u,password:p});S.token=d.token;S.user=d.user;sessionStorage.setItem("cyd_token",d.token);sessionStorage.setItem("cyd_user",JSON.stringify(d.user));S.selectedUser=null;S.page="home";render();startSync()}catch(e){S.authError=e.message;render()}}
function logout(){S.token=null;S.user=null;S.shopping=[];S.todos=[];S.events=[];S.users=[];S.selectedUser=null;S.authError=null;sessionStorage.removeItem("cyd_token");sessionStorage.removeItem("cyd_user");stopSync();render()}

// Helpers
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function getUser(id){return S.users.find(u=>u.id===id)||FIXED_USERS.find(u=>u.id===id)||{displayName:id,color:"#555",emoji:"?"}}
function getPartner(){return S.users.find(u=>u.id!==S.user?.id)||FIXED_USERS.find(u=>u.id!==(S.user?.id))||null}
function formatDate(d){const dt=new Date(d);return`${dt.getDate()}. ${MONTHS[dt.getMonth()].slice(0,3)}`}
function todayStr(){return new Date().toISOString().split("T")[0]}
function pColor(p){return p==="high"?"var(--red)":p==="medium"?"#f0883e":"var(--c-todo)"}
function av(uid,x=""){const u=getUser(uid);return`<div class="avatar-sm ${x}" style="background:${u.color}">${u.emoji}</div>`}
function recLabel(r){return RECURRENCE_OPTS.find(x=>x.id===r)?.label||""}

// Recurring
function getEventsForDate(ds){let r=[];S.events.forEach(e=>{if(e.date===ds){r.push(e);return}if(!e.recurrence||e.recurrence==="none")return;if(e.recurrenceEnd&&ds>e.recurrenceEnd)return;const ed=new Date(e.date),td=new Date(ds);if(td<ed)return;const diff=Math.floor((td-ed)/86400000);let m=false;if(e.recurrence==="daily")m=true;else if(e.recurrence==="weekly")m=diff%7===0;else if(e.recurrence==="monthly")m=td.getDate()===ed.getDate();else if(e.recurrence==="yearly")m=td.getDate()===ed.getDate()&&td.getMonth()===ed.getMonth();if(m)r.push({...e,_recurDate:ds})});return r}
function getEventsForMonth(y,m){const dim=new Date(y,m+1,0).getDate();let all=[];for(let d=1;d<=dim;d++){const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;getEventsForDate(ds).forEach(e=>{if(!all.find(x=>x.id===e.id&&(x._recurDate||x.date)===(e._recurDate||e.date)))all.push(e)})}return all.sort((a,b)=>(a._recurDate||a.date).localeCompare(b._recurDate||b.date)||a.time.localeCompare(b.time))}

// Notifications
function requestNotifPermission(){if(!("Notification" in window))return;Notification.requestPermission().then(p=>{S.notifEnabled=p==="granted";localStorage.setItem("cyd_notif",S.notifEnabled?"true":"false");render()})}
function toggleNotif(){if(S.notifEnabled){S.notifEnabled=false;localStorage.setItem("cyd_notif","false");render()}else requestNotifPermission()}
function startReminderCheck(){reminderTimer=setInterval(checkReminders,30000)}
function stopReminderCheck(){if(reminderTimer)clearInterval(reminderTimer);reminderTimer=null}
function checkReminders(){if(!S.notifEnabled||!S.events.length)return;const now=new Date();const tmrw=new Date();tmrw.setDate(tmrw.getDate()+1);[todayStr(),tmrw.toISOString().split("T")[0]].forEach(ds=>{getEventsForDate(ds).forEach(e=>{if(!e.reminders||!e.reminders.length)return;const evT=new Date(`${e._recurDate||e.date}T${e.time}:00`);e.reminders.forEach(rM=>{const rT=new Date(evT.getTime()-rM*60000);const diff=rT.getTime()-now.getTime();const key=`${e.id}_${e._recurDate||e.date}_${rM}`;if(diff<=0&&diff>-60000&&!S.firedReminders[key]){fireNotif(e,rM);S.firedReminders[key]=true;localStorage.setItem("cyd_fired",JSON.stringify(S.firedReminders))}})})})}
function fireNotif(e,m){const l=m===0?"Jetzt":m<60?`In ${m} Min`:m===60?"In 1 Std":m===1440?"Morgen":m===4320?"In 3 Tagen":"In 1 Woche";try{new Notification(`${l}: ${e.title}`,{body:`${e.time} Uhr`,tag:e.id})}catch(err){}}

// ICS
function exportICS(e){const dt=e._recurDate||e.date;const st=dt.replace(/-/g,"")+"T"+e.time.replace(/:/g,"")+"00";const dH=Math.floor((e.duration||60)/60),dM=(e.duration||60)%60;let ics=`BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//CheckYourDay//DE\nBEGIN:VEVENT\nDTSTART:${st}\nDURATION:PT${dH}H${dM}M\nSUMMARY:${e.title}\n`;if(e.note)ics+=`DESCRIPTION:${e.note}\n`;if(e.recurrence&&e.recurrence!=="none"){const f={daily:"DAILY",weekly:"WEEKLY",monthly:"MONTHLY",yearly:"YEARLY"}[e.recurrence];if(f){let rrule=`RRULE:FREQ=${f}`;if(e.recurrenceEnd)rrule+=`;UNTIL=${e.recurrenceEnd.replace(/-/g,"")}T235959Z`;ics+=rrule+"\n"}}if(e.reminders&&e.reminders.length)e.reminders.forEach(m=>{ics+=`BEGIN:VALARM\nTRIGGER:-PT${m}M\nACTION:DISPLAY\nDESCRIPTION:Erinnerung\nEND:VALARM\n`});ics+=`UID:${e.id}@checkyourday\nEND:VEVENT\nEND:VCALENDAR`;const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([ics],{type:"text/calendar"}));a.download=`${e.title.replace(/[^a-zA-Z0-9äöüÄÖÜ]/g,"_")}.ics`;a.click()}

async function acceptSug(id){const e=S.events.find(x=>x.id===id);if(!e)return;await api(`/api/events/${id}`,"PUT",{time:e.suggestedTime,suggestedTime:null,suggestedBy:null,status:"accepted"});sync()}

ass="auth-user" onclick="S.selectedUser='${u.id}';S.authError=null;render()"><div class="avatar" style="background:${u.color}">${u.emoji}</div><span>${esc(u.name)}</span></div>`).join("")}</div></div>`

function renderMain(){
  const titles={home:"Dashboard",shopping:"Einkaufsliste",todos:"To-Do",calendar:"Kalender"};
  const pending=S.events.filter(e=>e.invited===S.user.id&&e.status==="pending").length;
  return`<div class="header"><div class="header-left"><div class="avatar avatar-header" style="background:${S.user.color}">${S.user.emoji}</div><h2>${titles[S.page]}</h2></div><div class="header-actions"><div id="sync-dot" class="sync-dot ${S.syncStatus==="syncing"?"syncing":S.syncStatus==="error"?"error":""}"></div><button class="icon-btn ${S.notifEnabled?"active":""}" onclick="toggleNotif()">${S.notifEnabled?I.bell:I.bellOff}</button>${pending>0&&S.page!=="home"?`<button class="icon-btn" onclick="S.page='home';render()">${I.bell}<span class="badge">${pending}</span></button>`:""}<button class="icon-btn" onclick="logout()">${I.logout}</button></div></div>
  <div class="content">${renderPage()}</div>
  ${S.page!=="home"?`<button class="fab" onclick="openModal('${S.page}')">${I.plus}</button>`:""}
  <div class="bottom-nav">${[{id:"home",icon:"home",l:"Home"},{id:"shopping",icon:"cart",l:"Einkauf"},{id:"todos",icon:"check",l:"To-Do"},{id:"calendar",icon:"calendar",l:"Kalender"}].map(n=>`<button class="nav-item ${S.page===n.id?"active":""}" onclick="S.page='${n.id}';S.selectedDate=null;render()">${I[n.icon]}<span>${n.l}</span></button>`).join("")}</div>`
}

function renderPage(){if(S.page==="home")return renderDash();if(S.page==="shopping")return renderShop();if(S.page==="todos")return renderTodos();if(S.page==="calendar")return renderCal();return""}

function renderDash(){
  const os=S.shopping.filter(x=>!x.done).length,ot=S.todos.filter(x=>!x.done).length,ue=S.events.filter(x=>x.date>=todayStr()).length;
  const pi=S.events.filter(e=>e.invited===S.user.id&&e.status==="pending");
  const sc=S.events.filter(e=>e.suggestedBy&&e.suggestedBy!==S.user.id&&e.createdBy===S.user.id);
  let h="";
  if(!S.notifEnabled&&"Notification" in window)h+=`<div class="notif-banner" onclick="requestNotifPermission()"><div>${I.bell}</div><p>Benachrichtigungen aktivieren</p><button class="btn btn-sm" onclick="event.stopPropagation();requestNotifPermission()">Aktivieren</button></div>`;
  h+=`<div class="stats-row"><div class="stat-card" onclick="S.page='shopping';render()"><div class="stat-num" style="color:var(--c-shop)">${os}</div><div class="stat-label">Einkauf</div></div><div class="stat-card" onclick="S.page='todos';render()"><div class="stat-num" style="color:var(--c-todo)">${ot}</div><div class="stat-label">To-Dos</div></div><div class="stat-card" onclick="S.page='calendar';render()"><div class="stat-num" style="color:var(--c-cal)">${ue}</div><div class="stat-label">Termine</div></div></div>`;
  if(pi.length){h+=`<div class="section-label">Einladungen</div>`;pi.forEach(e=>{const c=getUser(e.createdBy);h+=`<div class="ev-card"><div class="ev-bar" style="background:${c.color}"></div><div class="ev-content"><div class="ev-title">${esc(e.title)}</div><div class="ev-detail">${I.cal} ${formatDate(e.date)} · ${I.clock} ${e.time} Uhr</div><div class="ev-detail">${I.user} von ${esc(c.displayName)}</div><div class="ev-actions"><button class="ev-action ev-accept" onclick="acceptEv('${e.id}')">Annehmen</button><button class="ev-action ev-suggest" onclick="openSugModal('${e.id}')">Neue Zeit</button><button class="ev-action ev-decline" onclick="declineEv('${e.id}')">Ablehnen</button></div></div></div>`})}
  if(sc.length){h+=`<div class="section-label">Zeitänderungen</div>`;sc.forEach(e=>{const b=getUser(e.suggestedBy);h+=`<div class="ev-card"><div class="ev-bar" style="background:#f0883e"></div><div class="ev-content"><div class="ev-title">${esc(e.title)}</div><div class="suggest-banner">${I.refresh} ${esc(b.displayName)} schlägt ${e.suggestedTime} Uhr vor<button onclick="acceptSug('${e.id}')">OK</button></div></div></div>`})}
  const nt=S.todos.filter(t=>!t.done).slice(0,3);
  if(nt.length){h+=`<div class="section-label">Nächste To-Dos</div>`;nt.forEach(t=>{h+=`<div class="card" onclick="S.page='todos';render()"><div class="card-row"><div class="priority-dot" style="background:${pColor(t.priority)}"></div><div class="card-text">${esc(t.text)}</div>${av(t.assignee)}</div>${t.due?`<div class="card-meta"><span class="tag" style="background:var(--c-todo-dim);color:var(--c-todo)">${I.clock} ${formatDate(t.due)}</span></div>`:""}</div>`})}
  const ns=S.shopping.filter(x=>!x.done).slice(0,3);
  if(ns.length){h+=`<div class="section-label">Einkaufsliste</div>`;ns.forEach(s=>{h+=`<div class="card" onclick="S.page='shopping';render()"><div class="card-row"><div class="card-text">${esc(s.text)}</div>${av(s.addedBy||s.createdBy)}</div></div>`})}
  if(!nt.length&&!ns.length&&!pi.length)h+=`<div class="empty-state"><p>Alles erledigt</p></div>`;
  return h;
}

function renderShop(){
  let h=`<div class="filter-tabs"><div class="filter-tab ${S.shopFilter==="alle"?"active":""}" onclick="S.shopFilter='alle';render()">Alle</div>${SHOP_CATS.map(c=>`<div class="filter-tab ${S.shopFilter===c.id?"active":""}" onclick="S.shopFilter='${c.id}';render()">${c.label}</div>`).join("")}</div>`;
  const items=S.shopFilter==="alle"?S.shopping:S.shopping.filter(x=>x.category===S.shopFilter);
  const open=items.filter(x=>!x.done),done=items.filter(x=>x.done);
  if(!open.length&&!done.length)h+=`<div class="empty-state"><p>Liste ist leer</p></div>`;
  open.forEach(s=>{const c=SHOP_CATS.find(x=>x.id===s.category);h+=`<div class="card"><div class="card-row"><div class="card-check" onclick="toggleShop('${s.id}')"></div><div class="card-text">${esc(s.text)}</div><button class="del-btn" onclick="event.stopPropagation();delShop('${s.id}')">${I.trash}</button>${av(s.addedBy||s.createdBy)}</div>${c?`<div class="card-meta"><span class="tag" style="background:var(--c-shop-dim);color:var(--c-shop)">${c.label}</span></div>`:""}</div>`});
  if(done.length){h+=`<div class="section-label">Erledigt</div>`;done.forEach(s=>{h+=`<div class="card card-done"><div class="card-row"><div class="card-check checked" onclick="toggleShop('${s.id}')">${I.checkSm}</div><div class="card-text done">${esc(s.text)}</div><button class="del-btn" onclick="event.stopPropagation();delShop('${s.id}')">${I.trash}</button></div></div>`})}
  return h;
}

function renderTodos(){
  const p=getPartner();
  let h=`<div class="filter-tabs"><div class="filter-tab ${S.todoFilter==="alle"?"active":""}" onclick="S.todoFilter='alle';render()">Alle</div><div class="filter-tab ${S.todoFilter==="meine"?"active":""}" onclick="S.todoFilter='meine';render()">Meine</div>${p?`<div class="filter-tab ${S.todoFilter==="partner"?"active":""}" onclick="S.todoFilter='partner';render()">${esc(p.displayName)}</div>`:""}</div>`;
  let items=S.todos;if(S.todoFilter==="meine")items=items.filter(t=>t.assignee===S.user.id);else if(S.todoFilter==="partner"&&p)items=items.filter(t=>t.assignee===p.id);
  const open=items.filter(t=>!t.done),done=items.filter(t=>t.done);
  if(!open.length&&!done.length)h+=`<div class="empty-state"><p>Keine Aufgaben</p></div>`;
  open.forEach(t=>{const b=getUser(t.addedBy||t.createdBy);h+=`<div class="card"><div class="card-row"><div class="card-check" onclick="toggleTodo('${t.id}')"></div><div class="card-text">${esc(t.text)}</div><button class="del-btn" onclick="event.stopPropagation();delTodo('${t.id}')">${I.trash}</button>${av(t.assignee)}</div><div class="card-meta"><div class="priority-dot" style="background:${pColor(t.priority)}"></div>${t.due?`<span class="tag" style="background:var(--c-todo-dim);color:var(--c-todo)">${I.clock} ${formatDate(t.due)}</span>`:""}<span class="tag" style="background:var(--c-shop-dim);color:var(--c-shop);font-size:.6rem">von ${esc(b.displayName)}</span></div></div>`});
  if(done.length){h+=`<div class="section-label">Erledigt</div>`;done.forEach(t=>{h+=`<div class="card card-done"><div class="card-row"><div class="card-check checked" onclick="toggleTodo('${t.id}')">${I.checkSm}</div><div class="card-text done">${esc(t.text)}</div><button class="del-btn" onclick="event.stopPropagation();delTodo('${t.id}')">${I.trash}</button></div></div>`})}
  return h;
}

function renderCal(){
  const dim=new Date(S.calYear,S.calMonth+1,0).getDate();let fd=new Date(S.calYear,S.calMonth,1).getDay();fd=fd===0?6:fd-1;const pd=new Date(S.calYear,S.calMonth,0).getDate();const today=todayStr();
  let cells="";for(let i=fd-1;i>=0;i--)cells+=`<div class="cal-day other">${pd-i}</div>`;
  for(let d=1;d<=dim;d++){const ds=`${S.calYear}-${String(S.calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;const de=getEventsForDate(ds);const dots=de.slice(0,3).map(e=>`<div class="cal-dot" style="background:${getUser(e.createdBy).color}"></div>`).join("");cells+=`<div class="cal-day ${ds===today?"today":""} ${ds===S.selectedDate?"selected":""}" onclick="S.selectedDate=S.selectedDate==='${ds}'?null:'${ds}';render()">${d}${dots?`<div class="cal-dots">${dots}</div>`:""}</div>`}
  for(let i=1;i<=42-fd-dim;i++)cells+=`<div class="cal-day other">${i}</div>`;
  const evts=S.selectedDate?getEventsForDate(S.selectedDate):getEventsForMonth(S.calYear,S.calMonth);
  let evH="";if(!evts.length)evH=`<div class="empty-state"><p>Keine Termine</p></div>`;
  else evts.forEach(e=>{
    const cr=getUser(e.createdBy),inv=e.invited?getUser(e.invited):null,eD=e._recurDate||e.date;
    let st="";if(e.invited){const sc=e.status==="accepted"?"background:var(--green-dim);color:var(--green)":e.status==="declined"?"background:var(--red-dim);color:var(--red)":"background:rgba(240,136,62,.1);color:#f0883e";const sl=e.status==="accepted"?"Bestätigt":e.status==="declined"?"Abgelehnt":"Ausstehend";st=`<span class="tag" style="${sc};font-size:.6rem">${sl} · ${esc(inv.displayName)}</span>`}
    let sg="";if(e.suggestedBy&&e.suggestedBy!==S.user.id&&e.createdBy===S.user.id){const b=getUser(e.suggestedBy);sg=`<div class="suggest-banner">${I.refresh} ${esc(b.displayName)} schlägt ${e.suggestedTime} Uhr vor<button onclick="acceptSug('${e.id}')">OK</button></div>`}
    let ac="";if(e.invited===S.user.id&&e.status==="pending")ac=`<div class="ev-actions"><button class="ev-action ev-accept" onclick="acceptEv('${e.id}')">Annehmen</button><button class="ev-action ev-suggest" onclick="openSugModal('${e.id}')">Neue Zeit</button><button class="ev-action ev-decline" onclick="declineEv('${e.id}')">Ablehnen</button></div>`;
    const expBtn=`<button class="ev-action ev-export" onclick="event.stopPropagation();exportICS(S.events.find(x=>x.id==='${e.id}'))">${I.download} Exportieren</button>`;
    if(e.createdBy===S.user.id)ac+=`<div class="ev-actions">${expBtn}<button class="ev-action ev-decline" onclick="delEv('${e.id}')">Löschen</button></div>`;else ac+=`<div class="ev-actions">${expBtn}</div>`;
    let tags="";if(e.recurrence&&e.recurrence!=="none")tags+=`<span class="tag" style="background:var(--c-cal-dim);color:var(--c-cal)">${I.repeat} ${recLabel(e.recurrence)}${e.recurrenceEnd?` bis ${formatDate(e.recurrenceEnd)}`:""}</span>`;if(e.reminders&&e.reminders.length)tags+=`<span class="tag" style="background:rgba(240,136,62,.1);color:#f0883e">${e.reminders.length} Erinnerung${e.reminders.length>1?"en":""}</span>`;
    evH+=`<div class="ev-card"><div class="ev-bar" style="background:${cr.color}"></div><div class="ev-content"><div class="ev-title">${esc(e.title)}</div><div class="ev-detail">${I.clock} ${e.time} Uhr · ${e.duration||60} Min${!S.selectedDate?` · ${I.cal} ${formatDate(eD)}`:""}</div><div class="ev-detail" style="margin-top:2px">${I.user} ${esc(cr.displayName)} ${st}</div>${tags?`<div class="ev-detail" style="margin-top:3px;gap:5px">${tags}</div>`:""}${e.note?`<div class="ev-detail" style="margin-top:3px;font-style:italic">${I.msg} ${esc(e.note)}</div>`:""}${sg}${ac}</div></div>`});
  return`<div class="cal-header"><h3>${MONTHS[S.calMonth]} ${S.calYear}</h3><div class="cal-nav"><button class="icon-btn" onclick="prevM()">${I.chevL}</button><button class="icon-btn" onclick="nextM()">${I.chevR}</button></div></div><div class="cal-grid">${DAYS_L.map(d=>`<div class="cal-day-label">${d}</div>`).join("")}${cells}</div><div class="section-label">${S.selectedDate?`Termine am ${formatDate(S.selectedDate)}`:`Alle Termine im ${MONTHS[S.calMonth]}`}</div>${evH}`
}
window.prevM=()=>{if(S.calMonth===0){S.calMonth=11;S.calYear--}else S.calMonth--;S.selectedDate=null;render()};
window.nextM=()=>{if(S.calMonth===11){S.calMonth=0;S.calYear++}else S.calMonth++;S.selectedDate=null;render()};

// Modals
function renderModal(){
  const root=document.getElementById("modal-container");if(!root||!S.modal)return;
  const p=getPartner();let inner="";
  if(S.modal==="shopping"){
    inner=`<div class="modal-header"><h3>Neuer Einkauf</h3><button class="close-btn" onclick="closeModal()">${I.x}</button></div><div class="input-group"><label>Artikel</label><input class="input" id="m-text" placeholder="z.B. Bettwäsche" autofocus></div><div class="input-group"><label>Kategorie</label><div class="cat-pills">${SHOP_CATS.map((c,i)=>`<div class="cat-pill ${i===0?"active":""}" data-cat="${c.id}" onclick="pickPill(this)">${c.label}</div>`).join("")}</div></div><button class="btn" style="background:var(--c-shop)" onclick="submitShop()">Hinzufügen</button>`;
  }else if(S.modal==="todos"){
    inner=`<div class="modal-header"><h3>Neue Aufgabe</h3><button class="close-btn" onclick="closeModal()">${I.x}</button></div><div class="input-group"><label>Aufgabe</label><input class="input" id="m-text" placeholder="z.B. Kisten packen" autofocus></div><div class="input-row"><div class="input-group"><label>Fällig am</label><input class="input" id="m-due" type="date"></div><div class="input-group"><label>Priorität</label><div class="cat-pills" id="pri-pills"><div class="cat-pill active" data-val="medium" onclick="pickPill(this)"><div class="priority-dot" style="background:#f0883e"></div> Mittel</div><div class="cat-pill" data-val="high" onclick="pickPill(this)"><div class="priority-dot" style="background:var(--red)"></div> Hoch</div><div class="cat-pill" data-val="low" onclick="pickPill(this)"><div class="priority-dot" style="background:var(--c-todo)"></div> Normal</div></div></div></div><div class="input-group"><label>Zuweisen</label><div class="cat-pills" id="assign-pills"><div class="cat-pill active" data-val="${S.user.id}" onclick="pickPill(this)"><div class="avatar-sm" style="background:${S.user.color};width:15px;height:15px;font-size:.45rem;border-radius:4px">${S.user.emoji}</div> ${esc(S.user.displayName)}</div>${p?`<div class="cat-pill" data-val="${p.id}" onclick="pickPill(this)"><div class="avatar-sm" style="background:${p.color};width:15px;height:15px;font-size:.45rem;border-radius:4px">${p.emoji}</div> ${esc(p.displayName)}</div>`:""}</div></div><button class="btn" style="background:var(--c-todo)" onclick="submitTodo()">Hinzufügen</button>`;
  }else if(S.modal==="calendar"){
    inner=`<div class="modal-header"><h3>Neuer Termin</h3><button class="close-btn" onclick="closeModal()">${I.x}</button></div><div class="input-group"><label>Titel</label><input class="input" id="m-title" placeholder="z.B. Möbel abholen" autofocus></div><div class="input-row"><div class="input-group"><label>Datum</label><input class="input" id="m-date" type="date" value="${S.selectedDate||""}"></div><div class="input-group"><label>Uhrzeit</label><input class="input" id="m-time" type="time"></div></div><div class="input-row"><div class="input-group"><label>Dauer (Min)</label><input class="input" id="m-dur" type="number" placeholder="60" value="60"></div><div class="input-group"><label>Einladen</label><div class="cat-pills"><div class="cat-pill" id="m-invite" onclick="this.classList.toggle('active')">${p?esc(p.displayName):"Partner"}</div></div></div></div><div class="input-group"><label>Wiederholen</label><div class="cat-pills" id="recur-pills">${RECURRENCE_OPTS.map((r,i)=>`<div class="cat-pill ${i===0?"active":""}" data-val="${r.id}" onclick="pickPill(this);toggleRecurEnd()">${r.label}</div>`).join("")}</div></div><div class="input-group" id="recur-end-group" style="display:none"><label>Wiederholen bis</label><input class="input" id="m-recur-end" type="date"></div><div class="input-group"><label>Erinnerungen</label><div class="cat-pills" id="remind-pills">${REMINDER_OPTS.map(r=>`<div class="cat-pill cat-pill-multi" data-val="${r.id}" onclick="this.classList.toggle('active')">${r.label}</div>`).join("")}</div></div><div class="input-group"><label>Notiz</label><input class="input" id="m-note" placeholder="Optional..."></div><button class="btn" style="background:var(--c-cal)" onclick="submitEv()">Termin erstellen</button>`;
  }else if(S.modal==="suggest"){
    const ev=S.events.find(e=>e.id===S._sugId);if(!ev){closeModal();return}
    inner=`<div class="modal-header"><h3>Neue Zeit vorschlagen</h3><button class="close-btn" onclick="closeModal()">${I.x}</button></div><p style="font-size:.82rem;color:var(--text-sec);margin-bottom:1rem"><strong>${esc(ev.title)}</strong> — aktuell ${ev.time} Uhr am ${formatDate(ev.date)}</p><div class="input-group"><label>Neue Uhrzeit</label><input class="input" id="m-stime" type="time" value="${ev.time}"></div><button class="btn" onclick="submitSug()">Vorschlag senden</button>`;
  }
  root.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${inner}</div></div>`;
}
window.openSugModal=(id)=>{S._sugId=id;S.modal="suggest";renderModal()};
window.pickPill=(el)=>{el.parentElement.querySelectorAll(".cat-pill").forEach(e=>e.classList.remove("active"));el.classList.add("active")};
window.toggleRecurEnd=()=>{const val=document.querySelector("#recur-pills .cat-pill.active")?.dataset.val;const g=document.getElementById("recur-end-group");if(g)g.style.display=(val&&val!=="none")?"block":"none"};
window.submitShop=()=>{const t=document.getElementById("m-text")?.value.trim();const c=document.querySelector("#modal-container .cat-pill.active[data-cat]")?.dataset.cat||"sonstiges";if(!t)return;addShop(t,c)};
window.submitTodo=()=>{const t=document.getElementById("m-text")?.value.trim();const d=document.getElementById("m-due")?.value||"";const pr=document.querySelector("#pri-pills .cat-pill.active")?.dataset.val||"medium";const as=document.querySelector("#assign-pills .cat-pill.active")?.dataset.val||S.user.id;if(!t)return;addTodo(t,d,pr,as)};
window.submitEv=()=>{const t=document.getElementById("m-title")?.value.trim();const d=document.getElementById("m-date")?.value;const tm=document.getElementById("m-time")?.value||"12:00";const dur=document.getElementById("m-dur")?.value||"60";const inv=document.getElementById("m-invite")?.classList.contains("active");const n=document.getElementById("m-note")?.value.trim()||"";const rec=document.querySelector("#recur-pills .cat-pill.active")?.dataset.val||"none";const recEnd=document.getElementById("m-recur-end")?.value||"";const rem=[...document.querySelectorAll("#remind-pills .cat-pill-multi.active")].map(el=>parseInt(el.dataset.val));if(!t||!d)return;addEv(t,d,tm,dur,inv,n,rec,rem,recEnd)};
window.submitSug=()=>{const t=document.getElementById("m-stime")?.value;if(!t||!S._sugId)return;suggestTime(S._sugId,t);closeModal()};

render();if(S.token)startSync();
</script>
</body>
</html>
